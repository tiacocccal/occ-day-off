<!DOCTYPE html>
<html>
<body>
    <h3>OCC 系統登入</h3>
    <input type="text" id="acc" placeholder="帳號"><br>
    <input type="password" id="pass" placeholder="密碼"><br>
    <button onclick="login()">點我登入</button>

    <script>
        // 把下面這行換成你最新部署的網址，確保前後沒有空格
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwNTSDQciYQOdRwH4mIx52UncsIdssSQ0dH2cdO8dmaYQxRX9viSP7zu5uvQSa5LEzxAg/exec"; 

        function login() {
            fetch(GAS_URL, {
                method: "POST",
                mode: "cors", // 確保使用 cors 模式
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    action: "login", 
                    account: document.getElementById('acc').value, 
                    password: document.getElementById('pass').value 
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") alert("登入成功，歡迎 " + data.name);
                else alert("帳密錯誤");
            })
            .catch(err => alert("錯誤: " + err));
        }
    </script>
</body>
</html>
