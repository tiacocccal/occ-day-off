<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCC 休假系統</title>
</head>
<body>
    <div id="app">
        <h4>系統登入</h4>
        <input type="text" id="acc" placeholder="帳號"><br>
        <input type="password" id="pass" placeholder="密碼"><br>
        <button onclick="login()">登入</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyrBFYdiCWhRR_cbvE_-gy2ocaPhEcr5x3lWfDga0SoYrBw4KmfiXvzJz9vZ6-YmRulKg/exec"; // <--- 務必貼上最新的網址

        function login() {
            const acc = document.getElementById('acc').value;
            const pass = document.getElementById('pass').value;

            fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "login", account: acc, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    document.getElementById('app').innerHTML = "<h1>登入成功！歡迎 " + data.name + "</h1>";
                } else {
                    alert("帳號或密碼錯誤");
                }
            })
            .catch(err => alert("連線錯誤，請確認網址是否已更新為新版本"));
        }
    </script>
</body>
</html>
