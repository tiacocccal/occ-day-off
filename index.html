<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OCC 休假表</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --pantone-turquoise: #00A896;  
      --pantone-dark-sea: #028090;   
      --pantone-navy: #114B5F;       
      --pantone-light-bg: #F8FBFB;   
      --occ-green-bg: #BCE3DF;       
      --occ-green-border: #4AA39A;   
      --occ-label-bg: #D2EFEA;       
    }
    body {
      background-color: var(--pantone-light-bg);
      font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
      margin: 0; padding-bottom: 85px; user-select: none;
    }
    .login-page-bg {
      min-height: 100vh;
      background: linear-gradient(180deg, #B9E3F8 0%, #E3F2FA 40%, #FFFFFF 100%);
      background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card-custom {
      background: rgba(255, 255, 255, 0.95); border-radius: 32px;
      box-shadow: 0 10px 30px rgba(17, 75, 95, 0.08);
      padding: 40px 30px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-logo-box {
      width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; overflow: hidden;
    }
    .login-logo-box img {
      width: 260px; height: 260px; object-fit: contain; margin-top: -10px;
    }
    .login-btn-gradient {
      background: linear-gradient(90deg, #79C2E6 0%, #F4BD93 100%);
      color: white !important; border: none; border-radius: 14px; font-weight: bold; padding: 12px;
    }
    .password-wrapper { position: relative; }
    .password-toggle-icon {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #a0b0b5; z-index: 10;
    }
    .occ-navbar { background-color: var(--pantone-navy); color: white; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .navbar-brand-box { display: flex; align-items: center; gap: 8px; font-size: 19px; font-weight: bold; }
    .navbar-brand-box img { height: 32px; max-height: 35px; width: auto; object-fit: contain; }
    .status-bar { background-color: white; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #EAEAEA; }
    .user-greeting-box { font-size: 17px; font-weight: 800; color: #028090; }
    .admin-badge { background-color: #FFEBEB; color: #FF4D4D; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: bold; margin-left: 6px; display: none; }
    .occ-footer { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: white; box-shadow: 0 -3px 12px rgba(0,0,0,0.04); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    .footer-item { display: flex; flex-direction: column; align-items: center; color: #8c9ba5; font-size: 11px; background: none; border: none; width: 25%; }
    .footer-item.active { color: var(--pantone-dark-sea); font-weight: bold; }
    .footer-item i { font-size: 20px; margin-bottom: 3px; }
    .calendar-container { padding: 12px; }
    .fc { background: white; border-radius: 24px; padding: 16px 8px; box-shadow: 0 4px 20px rgba(17, 75, 95, 0.04); border: none !important; }
    .fc-theme-standard td, .fc-theme-standard th, .fc-theme-standard .fc-scrollgrid { border: none !important; }
    .fc-daygrid-day { height: 95px !important; }
    .fc-day-today { background-color: var(--occ-green-bg) !important; border-radius: 12px !important; border: 1.5px solid var(--occ-green-border) !important; }
    .occ-leave-label { background-color: var(--occ-label-bg) !important; color: #028090 !important; font-size: 11px !important; font-weight: bold; text-align: center; padding: 3px 4px; margin: 2px auto 0 auto; border-radius: 6px; width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .card-custom { background: white; border-radius: 24px; box-shadow: 0 8px 24px rgba(11, 75, 95, 0.06); border: none; padding: 20px; margin-bottom: 16px; }
    .app-section { display: none; }
    .app-section.active { display: block; }
    .toggle-group { display: flex; background: #e4ecec; border-radius: 12px; padding: 4px; }
    .toggle-btn { flex: 1; border: none; background: none; padding: 8px; font-weight: bold; color: #666; border-radius: 10px; }
    .toggle-btn.active { background: white; color: var(--pantone-navy); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .ios-picker-container { display: flex; justify-content: center; background: #f4fafb; border-radius: 16px; padding: 12px 10px; position: relative; }
    .ios-picker-container::before { content: ""; position: absolute; left: 8px; right: 8px; top: 50%; transform: translateY(-50%); height: 36px; background: rgba(2, 128, 144, 0.06); border-top: 1px solid rgba(2, 128, 144, 0.15); border-bottom: 1px solid rgba(2, 128, 144, 0.15); border-radius: 8px; pointer-events: none; z-index: 5; }
    .ios-picker-col { height: 108px; overflow-y: scroll; scroll-snap-type: y mandatory; width: 70px; text-align: center; scrollbar-width: none; position: relative; }
    .ios-picker-col::-webkit-scrollbar { display: none; }
    .ios-picker-item { height: 36px; line-height: 36px; scroll-snap-align: center; font-size: 15px; color: #b0c2c5; }
    .ios-picker-item.selected { color: var(--pantone-navy) !important; font-weight: 800 !important; font-size: 17px !important; }
    .top-filter-bar { display: flex; background: white; border-radius: 14px; padding: 4px; gap: 4px; }
    .top-filter-btn { flex: 1; border: none; background: none; padding: 10px 4px; font-size: 13px; font-weight: 600; color: #7c8e94; border-radius: 10px; }
    .top-filter-btn.active { background: var(--pantone-navy); color: white; }
    .spinner-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(255,255,255,0.8); z-index:9999; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>

  <div id="loading-spinner" class="spinner-overlay" style="display:none;">
    <div class="spinner-border text-success" role="status"><span class="visually-hidden">Loading...</span></div>
  </div>

  <div id="section-login" class="login-page-bg">
    <div class="login-card-custom">
      <div class="login-logo-box" id="login-logo-container">
        <img src="logo.png" alt="Logo">
      </div>
      
      <div class="mb-3 text-start">
        <label class="form-label text-secondary small fw-bold">員工人資帳號</label>
        <input type="text" id="login-account" class="form-control py-2" placeholder="請輸入人資帳號" style="border-radius:12px;">
      </div>
      
      <div class="mb-4 text-start">
        <label class="form-label text-secondary small fw-bold">登入密碼</label>
        <div class="password-wrapper">
          <input type="password" id="login-password" class="form-control py-2" placeholder="請輸入密碼" style="border-radius:12px; padding-right: 40px;">
          <i class="fa-solid fa-eye password-toggle-icon" id="toggle-password-btn" onclick="togglePasswordVisibility()"></i>
        </div>
      </div>
      <button class="btn w-100 login-btn-gradient" onclick="handleLogin()">安全登入</button>
    </div>
  </div>

  <div id="main-application" style="display: none;">
    <div class="occ-navbar">
      <div class="navbar-brand-box" id="nav-brand-box">
        <img src="logo.png" alt="logo">
        <span>OCC 休假表</span>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-light me-1" onclick="openChangePasswordModal()">改密碼</button>
        <button class="btn btn-sm btn-light fw-bold" onclick="handleLogout()">登出</button>
      </div>
    </div>

    <div class="status-bar">
      <div class="user-greeting-box">
        HELLO <span id="user-greeting">同仁</span>
        <span class="admin-badge" id="admin-shield">🛡️ 管理員模式</span>
      </div>
      <div class="info-tip">💡 點選日期查看詳情</div>
    </div>

    <div class="container-fluid calendar-container">
      <div id="sect-home" class="app-section active"><div id="calendar"></div></div>

      <div id="sect-reserve" class="app-section">
        <div class="card-custom">
          <h5 class="mb-4 fw-bold" style="color:var(--pantone-navy);"><i class="fa-solid fa-calendar-check me-2"></i>填寫請假申請</h5>
          <div class="row g-2 mb-3">
            <div class="col-5">
              <label class="small text-secondary mb-1">開始日期</label>
              <input type="date" id="leave-start-date" class="form-control" onchange="autoCloseDatePicker()">
            </div>
            <div class="col-2 text-center pt-4 text-muted fw-bold">➡️</div>
            <div class="col-5">
              <label class="small text-secondary mb-1">結束日期</label>
              <input type="date" id="leave-end-date" class="form-control">
            </div>
          </div>
          <div class="mb-3">
            <label class="small text-secondary mb-1">時間類型</label>
            <div class="toggle-group">
              <button class="toggle-btn active" id="btn-time-full" onclick="setLeaveType('full')">整天 (08-17)</button>
              <button class="toggle-btn" id="btn-time-custom" onclick="setLeaveType('custom')">自訂時段</button>
            </div>
          </div>
          <div id="ios-time-picker-block" class="mb-3" style="display:none;">
            <div class="ios-picker-container">
              <div class="ios-picker-col" id="picker-sh"></div><div class="ios-picker-item" style="color:var(--pantone-navy); font-weight:bold;">:</div><div class="ios-picker-col" id="picker-sm"></div>
              <div class="mx-3 align-self-center text-muted fw-bold">至</div>
              <div class="ios-picker-col" id="picker-eh"></div><div class="ios-picker-item" style="color:var(--pantone-navy); font-weight:bold;">:</div><div class="ios-picker-col" id="picker-em"></div>
            </div>
          </div>
          <div class="mb-4">
            <label class="small text-secondary mb-1">備註事由</label>
            <textarea id="leave-memo" class="form-control" rows="3" placeholder="請輸入事由(如：特休、公假、事假)"></textarea>
          </div>
          <button class="btn w-100 py-2 text-white fw-bold" style="background-color: var(--pantone-turquoise); border-radius:12px;" onclick="submitLeave()">送出至 Google Sheet</button>
        </div>
      </div>

      <div id="sect-mytrips" class="app-section">
        <div class="card-custom">
          <h5 class="mb-3 fw-bold" style="color:var(--pantone-navy);"><i class="fa-solid fa-clock-rotate-left me-2"></i>我的請假清單</h5>
          <div id="my-leaves-list"></div>
        </div>
      </div>

      <div id="sect-overview" class="app-section">
        <div class="top-filter-bar mb-3">
          <button class="top-filter-btn active" id="filter-btn-day" onclick="handleTopFilter('day')">今日</button>
          <button class="top-filter-btn" id="filter-btn-month" onclick="handleTopFilter('month')">當月</button>
          <button class="top-filter-btn" id="filter-btn-seluser" onclick="handleTopFilter('seluser')">依人員篩選</button>
        </div>
        <div id="dynamic-wheel-box" class="card-custom p-3 mb-3" style="display: none; background: #f4fafb;">
          <div id="wheel-user-wrapper">
            <label class="small text-secondary mb-1 d-block text-center">滑動選擇人員</label>
            <div class="ios-picker-container" style="padding: 5px;"><div class="ios-picker-col" id="picker-ov-user" style="width:120px;"></div></div>
          </div>
          <button class="btn btn-sm w-100 mt-2 text-white" style="background: var(--pantone-dark-sea); border:none;" onclick="executeSearchFromWheel()">確認篩選</button>
        </div>
        <div class="card-custom"><div id="all-leaves-list"></div></div>
      </div>
    </div>

    <div class="occ-footer">
      <button class="footer-item active" onclick="switchTab('home', this)"><i class="fa-solid fa-house"></i>首頁</button>
      <button class="footer-item" onclick="switchTab('reserve', this)"><i class="fa-solid fa-calendar-plus"></i>預定請假</button>
      <button class="footer-item" onclick="switchTab('mytrips', this)"><i class="fa-solid fa-route"></i>行程管理</button>
      <button class="footer-item" onclick="switchTab('overview', this)"><i class="fa-solid fa-users"></i>單位總覽</button>
    </div>
  </div>

  <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered mx-3">
      <div class="modal-content" style="border-radius: 24px;">
        <div class="modal-header" style="background: var(--pantone-navy); color:white;">
          <h5 class="modal-title">修改個人密碼</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="small text-secondary">舊密碼</label><input type="password" id="pwd-old" class="form-control"></div>
          <div class="mb-3"><label class="small text-secondary">新密碼</label><input type="password" id="pwd-new" class="form-control"></div>
          <div class="mb-3"><label class="small text-secondary">再次輸入新密碼</label><input type="password" id="pwd-confirm" class="form-control"></div>
          <button class="btn w-100 text-white py-2" style="background: var(--pantone-dark-sea); border-radius:12px;" onclick="submitChangePassword()">同步更新至 Sheet</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales-all.min.js"></script>

  <script>
    // 🎯 填入你重新部署後拿到的最新 URL 網址
    const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbyrn2iuPtxyZCMT8xwRm5BR2QkNHCI4r3C1cVQXwyKK03SM-mhjrBfjpivybkaCmkj9Cg/exec"; 

    let calendar = null;
    let currentUser = null;
    let selectedLeaveType = 'full';
    let currentActiveFilter = 'day';
    let pickersInitialized = false;

    let mockDb = [
      { name: "怡君", date: "2026-06-12", start: "08:00", end: "17:00", memo: "特休", applicant: "怡君" },
      { name: "怡君", date: "2026-06-23", start: "08:00", end: "17:00", memo: "特休", applicant: "怡君" }
    ];
    const userList = ["怡君", "慶隆", "時彥", "其正", "宜霖", "莉詩", "微儀", "芃安", "暐喬", "人鋒", "翌安", "璽元", "貞瑜", "玉茹"];

    document.addEventListener("DOMContentLoaded", function() {
      try { autoDetectAssets(); } catch (e) { console.log("資產加載忽略", e); }
      try {
        initLazyPickers();
        checkLoginState();
      } catch (e) {
        console.error("初始化崩潰攔截:", e);
        document.getElementById('section-login').style.display = 'block';
        document.getElementById('main-application').style.display = 'none';
      }
    });

    function autoDetectAssets() {
      const bgImg = new Image(); bgImg.src = "background.jpg";
      bgImg.onload = function() { document.querySelector(".login-page-bg").style.backgroundImage = "url('background.jpg')"; };
    }

    function togglePasswordVisibility() {
      try {
        const pwdInput = document.getElementById("login-password");
        const icon = document.getElementById("toggle-password-btn");
        if (pwdInput.type === "password") {
          pwdInput.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          pwdInput.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      } catch(e) {}
    }

    function checkLoginState() {
      const stored = localStorage.getItem('occ_user');
      if(stored) { 
        currentUser = JSON.parse(stored); 
        showMainApp(); 
      } else { 
        document.getElementById('section-login').style.display = 'block'; 
        document.getElementById('main-application').style.display = 'none';
      }
    }

    function handleLogin() {
      const acc = document.getElementById('login-account').value.trim();
      const pass = document.getElementById('login-password').value;
      if(!acc || !pass) { alert('請輸入帳號密碼'); return; }

      showLoading(true);
      
      const formData = new URLSearchParams();
      formData.append('action', 'login');
      formData.append('account', acc);
      formData.append('password', pass);

      fetch(GOOGLE_SHEET_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString()
      })
      .then(res => res.json())
      .then(data => {
        showLoading(false);
        if(data.status === "success") {
          currentUser = { account: data.account, name: data.name };
          localStorage.setItem('occ_user', JSON.stringify(currentUser));
          showMainApp();
        } else { alert(data.message); }
      })
      .catch(err => { 
        showLoading(false); 
        console.error(err);
        alert("連線 Sheet 失敗！請檢查前端程式碼中的 GAS API 網址是否正確。"); 
      });
    }

    function handleLogout() { localStorage.clear(); window.location.reload(); }

    function showMainApp() {
      document.getElementById('section-login').style.display = 'none';
      document.getElementById('main-application').style.display = 'block';
      document.getElementById('user-greeting').innerText = currentUser.name;
      
      if(currentUser.account.toLowerCase() === "h74290" || currentUser.name === "怡君") {
        document.getElementById('admin-shield').style.display = 'inline-block';
      }
      setTimeout(() => { initCalendar(); handleTopFilter('day'); }, 100);
    }

    function submitChangePassword() {
      const oldPwd = document.getElementById('pwd-old').value;
      const n1 = document.getElementById('pwd-new').value;
      const n2 = document.getElementById('pwd-confirm').value;
      if(!oldPwd || !n1 || !n2) { alert('請填寫所有欄位'); return; }
      if(n1 !== n2) { alert('兩次新密碼不符'); return; }

      showLoading(true);

      const formData = new URLSearchParams();
      formData.append('action', 'changePassword');
      formData.append('account', currentUser.account);
      formData.append('oldPassword', oldPwd);
      formData.append('newPassword', n1);

      fetch(GOOGLE_SHEET_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString()
      })
      .then(res => res.json())
      .then(data => {
        showLoading(false);
        if(data.status === "success") {
          alert("密碼已成功在 Google Sheet 內更新！");
          bootstrap.Modal.getInstance(document.getElementById('changePasswordModal')).hide();
        } else { alert(data.message); }
      })
      .catch((err) => { 
        showLoading(false); 
        console.error(err);
        alert("同步修改密碼失敗"); 
      });
    }

    function initCalendar() {
      const calEl = document.getElementById('calendar'); if (!calEl) return;
      calendar = new FullCalendar.Calendar(calEl, {
        initialView: 'dayGridMonth', locale: 'zh-tw', height: 'auto',
        headerToolbar: { left: 'prev,title,next', center: '', right: 'today' },
        dayCellDidMount: function(info) {
          const matched = mockDb.filter(d => d.date === info.dateStr);
          if (matched.length > 0) {
            let container = info.el.querySelector('.fc-daygrid-day-events') || info.el;
            let html = '<div class="fc-event-container">';
            matched.forEach(lv => { html += `<div class="occ-leave-label">${lv.name}</div>`; });
            html += '</div>'; container.insertAdjacentHTML('beforeend', html);
          }
        }
      });
      calendar.render();
    }

    function autoCloseDatePicker() {
      const start = document.getElementById('leave-start-date');
      if(start.value) { document.getElementById('leave-end-date').value = start.value; start.blur(); }
    }

    function setLeaveType(type) {
      selectedLeaveType = type;
      document.getElementById('btn-time-full').classList.toggle('active', type === 'full');
      document.getElementById('btn-time-custom').classList.toggle('active', type === 'custom');
      document.getElementById('ios-time-picker-block').style.display = (type === 'custom') ? 'block' : 'none';
    }

    function submitLeave() {
      const dVal = document.getElementById('leave-start-date').value;
      const memoVal = document.getElementById('leave-memo').value.trim();
      if(!dVal) { alert('請選取日期'); return; }

      let startTime = "08:00", endTime = "17:00";
      if(selectedLeaveType === 'custom') {
        startTime = `${getWheelValue('picker-sh')}:${getWheelValue('picker-sm')}`;
        endTime = `${getWheelValue('picker-eh')}:${getWheelValue('picker-em')}`;
      }

      const postObj = {
        action: "submitLeave", name: currentUser.name, date: dVal,
        start: startTime, end: endTime, memo: memoVal || "無", applicant: currentUser.name
      };

      mockDb.push(postObj); 

      showLoading(true);

      const formData = new URLSearchParams();
      for (const key in postObj) { formData.append(key, postObj[key]); }

      fetch(GOOGLE_SHEET_API, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString() 
      })
      .then(res => res.json())
      .then(() => { 
        showLoading(false); 
        alert("已同步寫入 Google Sheet！"); 
        resetLeaveForm(); 
      })
      .catch((err) => { 
        showLoading(false); 
        console.error(err);
        alert("寫入失敗，但已存在本機臨時紀錄中。"); 
        resetLeaveForm(); 
      });
    }

    function resetLeaveForm() {
      document.getElementById('leave-start-date').value = ""; document.getElementById('leave-memo').value = "";
      if(calendar) calendar.render(); handleTopFilter('day'); switchTab('home', null);
    }

    function handleTopFilter(mode) {
      currentActiveFilter = mode;
      document.querySelectorAll('.top-filter-btn').forEach(b => b.classList.remove('active'));
      if(document.getElementById(`filter-btn-${mode}`)) document.getElementById(`filter-btn-${mode}`).classList.add('active');
      const wBox = document.getElementById('dynamic-wheel-box');
      if(mode === 'seluser') { wBox.style.display = 'block'; } 
      else { if(wBox) wBox.style.display = 'none'; renderOverviewList(mode); }
    }

    function executeSearchFromWheel() { renderOverviewList(currentActiveFilter); }

    function renderOverviewList(mode) {
      const container = document.getElementById('all-leaves-list'); if (!container) return;
      const todayStr = "2026-06-23"; const thisMonthStr = "2026-06";
      let filtered = []; let title = "";

      if(mode === 'day') { filtered = mockDb.filter(d => d.date === todayStr); title = `<h6>今日 (${todayStr}) 紀錄：</h6>`; }
      else if(mode === 'month') { filtered = mockDb.filter(d => d.date.startsWith(thisMonthStr)); title = `<h6>本月 (${thisMonthStr}) 紀錄：</h6>`; }
      else if(mode === 'seluser') { const u = getWheelValue('picker-ov-user'); filtered = mockDb.filter(d => d.name === u); title = `<h6>同仁 (${u}) 查詢結果：</h6>`; }

      if(filtered.length === 0) { container.innerHTML = title + "<p class='text-muted text-center py-3 small'>無請假紀錄</p>"; } 
      else {
        let html = title;
        filtered.forEach(x => {
          html += `<div class='p-2 mb-2 border-bottom small'><strong>${x.name}</strong> (${x.date})<br><span class='text-secondary'>${x.start}~${x.end} | ${x.memo}</span></div>`;
        });
        container.innerHTML = html;
      }
    }

    function switchTab(id, btn) {
      document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.footer-item').forEach(b => b.classList.remove('active'));
      document.getElementById(`sect-${id}`).classList.add('active');
      if(btn) btn.classList.add('active');
      if(id === 'home' && calendar) calendar.render();
      if(id === 'mytrips') {
        const c = document.getElementById('my-leaves-list');
        const my = mockDb.filter(d => d.name === currentUser.name);
        if(my.length===0) { c.innerHTML = "<p class='text-muted text-center small'>無請假紀錄</p>"; }
        else {
          let h = ""; my.forEach(x => { h += `<div class='py-2 border-bottom small'><strong>${x.date}</strong> ${x.start}-${x.end} (${x.memo})</div>`; });
          c.innerHTML = h;
        }
      }
    }

    function initLazyPickers() {
      if (pickersInitialized) return;
      
      const fill = (id, max) => {
        const el = document.getElementById(id); if(!el) return;
        el.innerHTML = "<div style='height:36px;'></div>"; 
        
        for(let i=0; i<max; i++) {
          let v = i<10?'0'+i:''+i; 
          let item = document.createElement('div');
          item.className = 'ios-picker-item' + (i === 0 ? ' selected' : ''); 
          item.innerText = v; 
          el.appendChild(item);
        }
        
        let pad = document.createElement('div'); pad.style.height = '36px'; el.appendChild(pad);
        
        el.addEventListener('scroll', () => {
          clearTimeout(el.t); el.t = setTimeout(() => {
            const idx = Math.round(el.scrollTop / 36) + 1;
            Array.from(el.children).forEach(c => c.classList.remove('selected'));
            if(el.children[idx]) el.children[idx].classList.add('selected');
          }, 60);
        });
      };
      
      fill('picker-sh', 24); fill('picker-sm', 60); fill('picker-eh', 24); fill('picker-em', 60);
      
      const uEl = document.getElementById('picker-ov-user');
      if(uEl) {
        uEl.innerHTML = "<div style='height:36px;'></div>";
        userList.forEach((u, i) => { 
          let item = document.createElement('div'); 
          item.className='ios-picker-item' + (i === 0 ? ' selected' : ''); 
          item.innerText=u; 
          uEl.appendChild(item); 
        });
        let pad = document.createElement('div'); pad.style.height = '36px'; uEl.appendChild(pad);
        
        uEl.addEventListener('scroll', () => {
          clearTimeout(uEl.t); uEl.t = setTimeout(() => {
            const idx = Math.round(uEl.scrollTop / 36) + 1;
            Array.from(uEl.children).forEach(c => c.classList.remove('selected'));
            if(uEl.children[idx]) uEl.children[idx].classList.add('selected');
          }, 60);
        });
      }
      pickersInitialized = true;
    }

    function getWheelValue(id) { 
      const el = document.getElementById(id); 
      const sel = el ? el.querySelector('.selected') : null; 
      return sel ? sel.innerText : (el && el.children[1] ? el.children[1].innerText : "00"); 
    }
    
    function showLoading(show) { document.getElementById('loading-spinner').style.display = show ? 'flex' : 'none'; }
    function openChangePasswordModal() { new bootstrap.Modal(document.getElementById('changePasswordModal')).show(); }
  </script>
</body>
</html>
