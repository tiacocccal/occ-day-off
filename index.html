<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OCC 休假表</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --pantone-navy: #114B5F; --occ-green-bg: #BCE3DF; }
    body { background-color: #F8FBFB; font-family: sans-serif; padding-bottom: 85px; }
    
    /* 1. 月曆樣式優化 (圓弧格子) */
    .fc .fc-daygrid-day-frame { border-radius: 15px; transition: 0.2s; }
    .fc .fc-daygrid-day.fc-day-today { background: var(--occ-green-bg) !important; border-radius: 15px; }
    .fc-header-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .fc-toolbar-title { font-size: 1.2rem !important; font-weight: bold; }
    
    /* 2. 頁首與導覽列修正 */
    .occ-navbar { background-color: var(--pantone-navy); color: white; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
    .navbar-brand-box img { height: 28px; }
    
    /* 3. 單位總覽篩選器樣式 */
    .filter-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
    .filter-tab { flex: 1; padding: 8px; border: 1px solid #ddd; background: white; border-radius: 8px; }
    .filter-tab.active { background: var(--pantone-navy); color: white; }
  </style>
</head>
<body>

  <div id="main-application">
    <div class="occ-navbar">
      <div class="navbar-brand-box">
        <img src="https://cdn-icons-png.flaticon.com/512/3063/3063175.png" alt="logo"> 
        <span>OCC 休假表</span>
      </div>
      <button class="btn btn-sm btn-light" onclick="handleLogout()">登出</button>
    </div>

    <div class="container-fluid pt-3">
      <div id="sect-home" class="app-section active">
        <div id="calendar"></div>
      </div>
      
      <div id="sect-overview" class="app-section">
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterOverview('day')">當日</button>
            <button class="filter-tab" onclick="filterOverview('month')">當月</button>
            <button class="filter-tab" onclick="filterOverview('user')">人員</button>
        </div>
        <div id="overview-list" class="card p-3"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' }, // 箭頭與年月同列
        dateClick: function(info) {
          // 點擊日期彈出請假表單 (模擬圖3效果)
          alert("日期: " + info.dateStr + "\n跳轉至請假表單...");
          switchTab('reserve'); 
        }
      });
      calendar.render();
    });

    function switchTab(tabId) {
      document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
      document.getElementById('sect-' + tabId).classList.add('active');
    }
  </script>
</body>
</html>
