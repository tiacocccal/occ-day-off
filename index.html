  <title>OCC 休假表</title>

  <style>
    :root {
      --pantone-turquoise: #00A896;  
      --pantone-dark-sea: #028090;   
      --pantone-navy: #114B5F;       
      --pantone-light-bg: #F8FBFB;   
      --occ-green-bg: #BCE3DF;       
      --occ-green-border: #4AA39A;   
      --occ-label-bg: #D2EFEA;       
    }
    body {
      background-color: var(--pantone-light-bg);
      font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
      margin: 0; padding-bottom: 85px; user-select: none;
    }
    .login-page-bg {
      min-height: 100vh;
      background: linear-gradient(180deg, #B9E3F8 0%, #E3F2FA 40%, #FFFFFF 100%);
      background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card-custom {
      background: rgba(255, 255, 255, 0.95); border-radius: 32px;
      box-shadow: 0 10px 30px rgba(17, 75, 95, 0.08);
      padding: 40px 30px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-logo-box {
      width: 100%;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
      overflow: hidden;
    }
    .login-logo-box img {
      width: 260px;
      height: 260px;
      object-fit: contain;
      margin-top: -10px;
    }
    .login-btn-gradient {
      background: linear-gradient(90deg, #79C2E6 0%, #F4BD93 100%);
      color: white !important; border: none; border-radius: 14px; font-weight: bold; padding: 12px;
    }
    .password-wrapper {
      position: relative;
    }
    .password-toggle-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #a0b0b5;
      z-index: 10;
    }
    .occ-navbar { background-color: var(--pantone-navy); color: white; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .navbar-brand-box { display: flex; align-items: center; gap: 8px; font-size: 19px; font-weight: bold; }
    .navbar-brand-box img { height: 32px; max-height: 35px; width: auto; object-fit: contain; }
    .status-bar { background-color: white; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #EAEAEA; }
    .user-greeting-box { font-size: 17px; font-weight: 800; color: #028090; }
    .admin-badge { background-color: #FFEBEB; color: #FF4D4D; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: bold; margin-left: 6px; display: none; }
