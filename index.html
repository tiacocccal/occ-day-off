<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OCC 休假表</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #F0F7F7; font-family: 'Segoe UI', sans-serif; }
    /* 單行導覽列 */
    .navbar { background: #114B5F !important; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
    /* 圓弧卡片 */
    .card { border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: none; padding: 25px; margin: 20px; }
    .btn-custom { border-radius: 20px; background: #00A896; color: white; }
  </style>
</head>
<body>

  <nav class="navbar">
    <span><i class="fa-solid fa-plane-departure"></i> OCC 休假表</span>
    <button class="btn btn-sm btn-outline-light" onclick="logout()">登出</button>
  </nav>

  <div class="container">
    <div class="card" onclick="openLeaveModal()">
      <h5><i class="fa-solid fa-calendar-plus"></i> 預定請假</h5>
      <p class="text-muted">點擊此處選擇日期進行請假</p>
    </div>
  </div>

  <div class="modal fade" id="leaveModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius:25px;">
        <div class="modal-header"><h5 class="modal-title">登記請假</h5></div>
        <div class="modal-body">請選擇您的請假時間與事由。</div>
        <div class="modal-footer"><button class="btn btn-custom" data-bs-dismiss="modal">確定</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script>
    function logout() { localStorage.clear(); window.location.reload(); }
    function openLeaveModal() {
      var myModal = new bootstrap.Modal(document.getElementById('leaveModal'));
      myModal.show();
    }
  </script>
</body>
</html>
