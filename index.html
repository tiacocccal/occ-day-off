<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>OCC 休假表</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <style>
    body { background: #F0F7F7; font-family: sans-serif; }
    .nav-bar { background: #114B5F; color: white; padding: 10px; display: flex; align-items: center; justify-content: space-between; }
    .card { border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; }
  </style>
</head>
<body>
  <div class="nav-bar">
    <span><i class="fa fa-plane-departure"></i> OCC 休假表</span>
    <button class="btn btn-sm btn-outline-light" onclick="logout()">登出</button>
  </div>
  <div id="main" class="container mt-4">
    <div class="card" onclick="openModal()">點擊此處測試彈出視窗</div>
  </div>
  <script>
    function logout() {
      localStorage.clear();
      window.location.reload(); // 強制歸零
    }
    function openModal() {
      alert("彈出視窗功能已恢復：請在此登記您的請假事由。");
    }
  </script>
</body>
</html>
