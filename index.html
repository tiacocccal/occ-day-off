<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>OCC 休假系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <style>
    body { background: #F8FBFB; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
<div class="card">
  <h4 class="text-center mb-4">OCC 休假系統</h4>
  <input type="text" id="acc" class="form-control mb-3" placeholder="員工帳號">
  <input type="password" id="pass" class="form-control mb-3" placeholder="登入密碼">
  <button class="btn btn-primary w-100" onclick="login()">登入</button>
</div>

<script>
  // 請填入剛才部署後複製的最新網址
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwUZGtUUntv438GKyEWR5IYQiRiM0OW-S8QgeLchWrLPyQJRgl6Oc9lhnj-iX5SWIJg-Q/exec"; 

  function login() {
    const acc = document.getElementById('acc').value.trim();
    const pass = document.getElementById('pass').value.trim();
    
    fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "login", account: acc, password: pass })
    })
    .then(res => res.json())
    .then(data => {
      if(data.status === "success") {
        alert("歡迎 " + data.name);
        document.body.innerHTML = "<h3 class='text-center mt-5'>登入成功！</h3>";
      } else {
        alert("帳號或密碼錯誤");
      }
    })
    .catch(err => alert("連線失敗，請檢查網址是否有更新"));
  }
</script>
</body>
</html>
