<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>OCC 休假系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <style>
    body { background: #F8FBFB; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div class="card">
  <h4 class="text-center mb-4">系統登入</h4>
  <input type="text" id="acc" class="form-control mb-3" placeholder="請輸入帳號">
  <input type="password" id="pass" class="form-control mb-3" placeholder="請輸入密碼">
  <button class="btn btn-primary w-100" onclick="login()">登入</button>
</div>

<script>
  // 請務必確認這串網址是剛剛重新部署產生的，且設定為「所有人」存取
  const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbxxSW7rqqjgMuutJepuCjHApXSqDPPlMutHk6WGiu_2YAHWQHPKer8MawCnPkBz_3i7hg/exec";

  function login() {
    const acc = document.getElementById('acc').value.trim();
    const pass = document.getElementById('pass').value.trim();
    
    if(!acc || !pass) { alert('請填寫帳號密碼'); return; }

    const formData = new URLSearchParams();
    formData.append('action', 'login');
    formData.append('account', acc);
    formData.append('password', pass);

    fetch(GOOGLE_SHEET_API, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData.toString()
    })
    .then(() => {
      alert("連線成功！(POST請求已送出)");
    })
    .catch(err => {
      alert("連線失敗，請檢查網址或權限: " + err);
    });
  }
</script>
</body>
</html>
