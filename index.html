<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OCC 休假表</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#114B5F">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --pantone-turquoise: #00A896;
      --pantone-dark-sea: #028090;
      --pantone-navy: #114B5F;
      --pantone-light-bg: #F8FBFB;
      --occ-green-bg: #BCE3DF;
      --occ-green-border: #4AA39A;
      --occ-label-bg: #D2EFEA;
    }
    body {
      background-color: var(--pantone-light-bg);
      font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
      margin: 0; padding-bottom: 85px; user-select: none;
    }
    /* ===== 登入畫面 ===== */
    .login-page-bg {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; background: linear-gradient(180deg, #B9E3F8 0%, #FFFFFF 100%);
    }
    .login-card-custom {
      background: rgba(255, 255, 255, 0.95); border-radius: 24px; padding: 24px;
      width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
    }
    /* logo 放大到約螢幕 1/3 高，但用固定框 + object-fit:contain 保證不會撐爆版面 */
    .login-logo-box { width: 100%; height: 30vh; max-height: 280px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; }
    .login-logo-box img { max-width: 85%; max-height: 100%; width: auto; height: auto; object-fit: contain; }
    .login-btn-gradient { background: linear-gradient(90deg, #79C2E6 0%, #F4BD93 100%); color: white !important; border: none; border-radius: 14px; font-weight: bold; padding: 12px; }
    .password-wrapper { position: relative; }
    .password-toggle-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #a0b0b5; z-index: 10; }

    /* ===== Header / Footer ===== */
    .occ-navbar { background-color: var(--pantone-navy); color: white; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .navbar-brand-box { display: flex; align-items: center; gap: 8px; font-size: 19px; font-weight: bold; }
    .navbar-brand-box img { max-height: 28px; width: auto; object-fit: contain; }
    .status-bar { background-color: white; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #EAEAEA; }
    .user-greeting-box { font-size: 17px; font-weight: 800; color: #028090; }
    .admin-badge { background-color: #FFEBEB; color: #FF4D4D; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: bold; margin-left: 6px; }
    .occ-footer { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: white; box-shadow: 0 -3px 12px rgba(0,0,0,0.04); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    .footer-item { display: flex; flex-direction: column; align-items: center; color: #8c9ba5; font-size: 11px; background: none; border: none; width: 25%; }
    .footer-item.active { color: var(--pantone-dark-sea); font-weight: bold; }
    .footer-item i { font-size: 20px; margin-bottom: 3px; }

    /* ===== 月曆（圖2風格：圓弧日期格、數字不加「日」、箭頭與年月同排） ===== */
    .calendar-container { padding: 10px; width: 100%; box-sizing: border-box; overflow: hidden; }
    #calendar { width: 100%; max-width: 100%; margin: 0 auto; }
    .fc { width: 100% !important; table-layout: fixed; background: white; border-radius: 24px; padding: 16px 8px; box-shadow: 0 4px 20px rgba(17, 75, 95, 0.04); border: none !important; }
    .fc-theme-standard td, .fc-theme-standard th, .fc-theme-standard .fc-scrollgrid { border: none !important; }
    .fc-header-toolbar { display: flex !important; flex-wrap: nowrap !important; align-items: center !important; justify-content: space-between !important; margin-bottom: 12px !important; }
    .fc-toolbar-chunk { display: flex !important; align-items: center !important; gap: 6px; }
    .fc-toolbar-title { font-size: 20px !important; font-weight: 800; color: var(--pantone-navy); white-space: nowrap; }
    .fc-button { background: var(--pantone-navy) !important; border: none !important; border-radius: 10px !important; box-shadow: none !important; width: 34px; height: 34px; display:flex; align-items:center; justify-content:center; padding: 0 !important; }
    .fc-today-button { width: auto !important; padding: 0 14px !important; border-radius: 16px !important; background: white !important; color: var(--pantone-dark-sea) !important; border: 1.5px solid var(--pantone-dark-sea) !important; font-weight: 700; font-size: 13px; text-transform: none; }
    .fc-today-button:disabled { opacity: 0.5; }
    .fc-daygrid-day-frame { border-radius: 14px; margin: 2px; }
    .fc-daygrid-day-top { justify-content: center; padding-top: 4px; }
    .fc-daygrid-day-number { text-decoration: none !important; color: var(--pantone-navy) !important; font-weight: 600; font-size: 13px; }
    .fc-daygrid-day.fc-day-today .fc-daygrid-day-frame { background-color: var(--occ-green-bg) !important; border-radius: 14px !important; border: 1.5px solid var(--occ-green-border) !important; }
    .fc-daygrid-day { height: 95px !important; cursor: pointer; }
    .occ-leave-label { background-color: var(--occ-label-bg) !important; color: #028090 !important; font-size: 11px !important; font-weight: bold; text-align: center; padding: 3px 4px; margin: 2px auto 0 auto; border-radius: 6px; width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

    .card-custom { background: white; border-radius: 24px; box-shadow: 0 8px 24px rgba(11, 75, 95, 0.06); border: none; padding: 20px; margin-bottom: 16px; }
    .app-section { display: none; width: 100%; }
    .app-section.active { display: block; }
    .toggle-group { display: flex; background: #e4ecec; border-radius: 12px; padding: 4px; }
    .toggle-btn { flex: 1; border: none; background: none; padding: 10px; font-weight: bold; color: #666; border-radius: 10px; }
    .toggle-btn.active { background: white; color: var(--pantone-navy); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .ios-picker-container { display: flex; justify-content: center; background: #f4fafb; border-radius: 16px; padding: 12px 10px; position: relative; }
    .ios-picker-container::before { content: ""; position: absolute; left: 8px; right: 8px; top: 50%; transform: translateY(-50%); height: 36px; background: rgba(2, 128, 144, 0.06); border-top: 1px solid rgba(2, 128, 144, 0.15); border-bottom: 1px solid rgba(2, 128, 144, 0.15); border-radius: 8px; pointer-events: none; z-index: 5; }
    .ios-picker-col { height: 108px; overflow-y: scroll; scroll-snap-type: y mandatory; width: 70px; text-align: center; scrollbar-width: none; position: relative; }
    .ios-picker-col::-webkit-scrollbar { display: none; }
    .ios-picker-item { height: 36px; line-height: 36px; scroll-snap-align: center; font-size: 15px; color: #b0c2c5; }
    .ios-picker-item.selected { color: var(--pantone-navy) !important; font-weight: 800 !important; font-size: 17px !important; }
    .top-filter-bar { display: flex; background: white; border-radius: 14px; padding: 4px; gap: 4px; flex-wrap: wrap; }
    .top-filter-btn { flex: 1 1 auto; min-width: 70px; border: none; background: none; padding: 10px 4px; font-size: 12px; font-weight: 600; color: #7c8e94; border-radius: 10px; }
    .top-filter-btn.active { background: var(--pantone-navy); color: white; }
    .spinner-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(255,255,255,0.8); z-index:9999; display:flex; align-items:center; justify-content:center; }
    .date-range-row { display: flex; align-items: center; gap: 8px; }
    .date-range-row .date-col { flex: 1; }
    .date-range-row .arrow-col { flex: 0 0 24px; text-align: center; color: #999; padding-top: 22px; }
    .leave-item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    .leave-item-actions button { border: none; background: none; font-size: 15px; padding: 4px 8px; }
    .leave-item-actions .edit-btn { color: var(--pantone-dark-sea); }
    .leave-item-actions .del-btn { color: #e05656; }
    .delegate-box { background: #fff7ec; border: 1px solid #f4d9b3; border-radius: 12px; padding: 10px 12px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div id="loading-spinner" class="spinner-overlay" style="display:none;">
    <div class="spinner-border text-success" role="status"><span class="visually-hidden">Loading...</span></div>
  </div>

  <!-- 登入畫面 -->
  <div id="section-login" class="login-page-bg">
    <div class="login-card-custom">
      <div class="login-logo-box" id="login-logo-container">
        <img src="logo.png" alt="Logo">
      </div>
      <div class="mb-3 text-start">
        <label class="form-label text-secondary small fw-bold">員工人資帳號</label>
        <input type="text" id="login-account" class="form-control py-2" placeholder="請輸入人資帳號" style="border-radius:12px;">
      </div>
      <div class="mb-4 text-start">
        <label class="form-label text-secondary small fw-bold">登入密碼</label>
        <div class="password-wrapper">
          <input type="password" id="login-password" class="form-control py-2" placeholder="請輸入密碼" style="border-radius:12px; padding-right: 40px;">
          <i class="fa-solid fa-eye password-toggle-icon" id="toggle-password-btn" onclick="togglePasswordVisibility()"></i>
        </div>
      </div>
      <button class="btn w-100 login-btn-gradient" onclick="handleLogin()">登入</button>
    </div>
  </div>

  <!-- 主應用程式 -->
  <div id="main-application" style="display: none;">
    <div class="occ-navbar">
      <div class="navbar-brand-box" id="nav-brand-box">
        <img src="logo.png" alt="logo">
        <span>OCC 休假表</span>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-light me-1" onclick="openChangePasswordModal()">改密碼</button>
        <button class="btn btn-sm btn-light fw-bold" onclick="handleLogout()">登出</button>
      </div>
    </div>
    <div class="status-bar">
      <div class="user-greeting-box">
        HELLO <span id="user-greeting">同仁</span>
        <span class="admin-badge" id="admin-shield" style="display:none;">🛡️ 管理員模式</span>
      </div>
      <div class="info-tip">💡 點選日期查看詳情</div>
    </div>

    <div class="container-fluid calendar-container">

      <!-- 首頁：月曆 -->
      <div id="sect-home" class="app-section active"><div id="calendar"></div></div>

      <!-- 預定請假 -->
      <div id="sect-reserve" class="app-section">
        <div class="card-custom">
          <h5 class="mb-3 fw-bold" style="color:var(--pantone-navy);"><i class="fa-solid fa-calendar-check me-2"></i><span id="reserve-form-title">填寫請假申請</span></h5>

          <div id="reserve-delegate-box" class="delegate-box" style="display:none;">
            <label class="small text-secondary mb-1 d-block fw-bold"><i class="fa-solid fa-user-shield me-1"></i>代為申請對象</label>
            <select id="reserve-delegate-select" class="form-select form-select-sm"></select>
          </div>

          <div class="date-range-row mb-3">
            <div class="date-col">
              <label class="small text-secondary mb-1">開始日期</label>
              <input type="date" id="leave-start-date" class="form-control">
            </div>
            <div class="arrow-col pt-4">➡️</div>
            <div class="date-col">
              <label class="small text-secondary mb-1">結束日期</label>
              <input type="date" id="leave-end-date" class="form-control">
            </div>
          </div>

          <div class="mb-3">
            <label class="small text-secondary mb-1">時間類型</label>
            <div class="toggle-group">
              <button class="toggle-btn active" id="btn-time-full" onclick="setLeaveType('full')">整天 (08-17)</button>
              <button class="toggle-btn" id="btn-time-custom" onclick="setLeaveType('custom')">特殊時段</button>
            </div>
          </div>

          <div id="ios-time-picker-block" class="mb-3" style="display:none;">
            <div class="ios-picker-container">
              <div class="ios-picker-col" id="picker-sh"></div><div class="ios-picker-item" style="color:var(--pantone-navy); font-weight:bold;">:</div><div class="ios-picker-col" id="picker-sm"></div>
              <div class="mx-3 align-self-center text-muted fw-bold">至</div>
              <div class="ios-picker-col" id="picker-eh"></div><div class="ios-picker-item" style="color:var(--pantone-navy); font-weight:bold;">:</div><div class="ios-picker-col" id="picker-em"></div>
            </div>
          </div>

          <div class="mb-4">
            <label class="small text-secondary mb-1">備註事由</label>
            <textarea id="leave-memo" class="form-control" rows="3" placeholder="請輸入事由(如：特休、公假、事假)"></textarea>
          </div>

          <button class="btn w-100 py-2 text-white fw-bold" id="reserve-submit-btn" style="background-color: var(--pantone-turquoise); border-radius:12px;" onclick="submitReserveForm()">送出預定</button>
          <button class="btn w-100 py-2 mt-2 text-secondary fw-bold" id="reserve-cancel-btn" style="display:none; border-radius:12px;" onclick="cancelEditReserve()">取消編輯</button>
        </div>
      </div>

      <!-- 行程管理 / 我的請假清單 -->
      <div id="sect-mytrips" class="app-section">
        <div class="card-custom">
          <h5 class="mb-3 fw-bold" style="color:var(--pantone-navy);"><i class="fa-solid fa-clock-rotate-left me-2"></i><span id="mytrips-title">我的請假清單</span></h5>
          <div id="my-leaves-list"></div>
        </div>
      </div>

      <!-- 單位總覽 -->
      <div id="sect-overview" class="app-section">
        <div class="top-filter-bar mb-3">
          <button class="top-filter-btn active" id="filter-btn-day" onclick="handleTopFilter('day')">當日</button>
          <button class="top-filter-btn" id="filter-btn-month" onclick="handleTopFilter('month')">當月</button>
          <button class="top-filter-btn" id="filter-btn-custommonth" onclick="handleTopFilter('custommonth')">選擇月份</button>
          <button class="top-filter-btn" id="filter-btn-seluser" onclick="handleTopFilter('seluser')">選擇人員</button>
        </div>

        <div id="custommonth-box" class="card-custom p-3 mb-3" style="display:none;">
          <input type="month" id="overview-month-input" class="form-control" onchange="renderOverviewList('custommonth')">
        </div>

        <div id="dynamic-wheel-box" class="card-custom p-3 mb-3" style="display: none; background: #f4fafb;">
          <div id="wheel-user-wrapper">
            <label class="small text-secondary mb-1 d-block text-center">滑動選擇人員</label>
            <div class="ios-picker-container" style="padding: 5px;"><div class="ios-picker-col" id="picker-ov-user" style="width:120px;"></div></div>
          </div>
          <button class="btn btn-sm w-100 mt-2 text-white" style="background: var(--pantone-dark-sea); border:none;" onclick="executeSearchFromWheel()">確認篩選</button>
        </div>

        <div class="card-custom"><div id="all-leaves-list"></div></div>
      </div>
    </div>

    <div class="occ-footer">
      <button class="footer-item active" onclick="switchTab('home', this)"><i class="fa-solid fa-house"></i>首頁</button>
      <button class="footer-item" onclick="switchTab('reserve', this)"><i class="fa-solid fa-calendar-plus"></i>預定請假</button>
      <button class="footer-item" onclick="switchTab('mytrips', this)"><i class="fa-solid fa-route"></i>行程管理</button>
      <button class="footer-item" onclick="switchTab('overview', this)"><i class="fa-solid fa-users"></i>單位總覽</button>
    </div>
  </div>

  <!-- 改密碼 Modal -->
  <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered mx-3">
      <div class="modal-content" style="border-radius: 24px;">
        <div class="modal-header" style="background: var(--pantone-navy); color:white;">
          <h5 class="modal-title">修改個人密碼</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="small text-secondary">舊密碼</label><input type="password" id="pwd-old" class="form-control"></div>
          <div class="mb-3"><label class="small text-secondary">新密碼</label><input type="password" id="pwd-new" class="form-control"></div>
          <div class="mb-3"><label class="small text-secondary">再次輸入新密碼</label><input type="password" id="pwd-confirm" class="form-control"></div>
          <button class="btn w-100 text-white py-2" style="background: var(--pantone-dark-sea); border-radius:12px;" onclick="submitChangePassword()">確認修改</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 當日請假名單 Modal（點日曆跳出） -->
  <div class="modal fade" id="dayDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered mx-3">
      <div class="modal-content" style="border-radius: 24px;">
        <div class="modal-header" style="background: var(--pantone-navy); color:white;">
          <h5 class="modal-title" id="dayDetailTitle">請假名單</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="dayDetailList" class="mb-3"></div>
          <button class="btn w-100 py-2 text-white fw-bold" style="background-color: var(--pantone-turquoise); border-radius:12px;" onclick="openQuickLeaveModalFromDay()"><i class="fa-solid fa-plus me-1"></i>登記請假</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 快速請假 Modal（單日） -->
  <div class="modal fade" id="quickLeaveModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered mx-3">
      <div class="modal-content" style="border-radius: 24px;">
        <div class="modal-header" style="background: var(--pantone-navy); color:white;">
          <h5 class="modal-title">登記請假表單</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="quick-delegate-box" class="delegate-box" style="display:none;">
            <label class="small text-secondary mb-1 d-block fw-bold"><i class="fa-solid fa-user-shield me-1"></i>代為申請對象</label>
            <select id="quick-delegate-select" class="form-select form-select-sm"></select>
          </div>
          <div class="mb-3">
            <label class="small text-secondary mb-1 d-block">請假日期</label>
            <div id="quick-date-display" class="form-control bg-light fw-bold"></div>
          </div>
          <div class="mb-3">
            <label class="small text-secondary mb-1 d-block">請假時間模式</label>
            <div class="toggle-group">
              <button class="toggle-btn active" id="q-btn-time-full" onclick="setQuickLeaveType('full')">整天</button>
              <button class="toggle-btn" id="q-btn-time-custom" onclick="setQuickLeaveType('custom')">指定時間段</button>
            </div>
          </div>
          <div id="q-ios-time-picker-block" class="mb-3" style="display:none;">
            <label class="small text-secondary mb-1 d-block text-center">上下滑動設定時間段</label>
            <div class="ios-picker-container">
              <div class="ios-picker-col" id="q-picker-sh"></div><div class="ios-picker-item" style="color:var(--pantone-navy); font-weight:bold;">:</div><div class="ios-picker-col" id="q-picker-sm"></div>
              <div class="mx-3 align-self-center text-muted fw-bold">至</div>
              <div class="ios-picker-col" id="q-picker-eh"></div><div class="ios-picker-item" style="color:var(--pantone-navy); font-weight:bold;">:</div><div class="ios-picker-col" id="q-picker-em"></div>
            </div>
          </div>
          <div class="mb-4">
            <label class="small text-secondary mb-1">事由 / 備註 (選填)</label>
            <input type="text" id="q-leave-memo" class="form-control" placeholder="如：事假、王小明代">
          </div>
          <button class="btn w-100 py-2 text-white fw-bold" style="background-color: var(--pantone-turquoise); border-radius:12px;" onclick="submitQuickLeave()">確認送出假單</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales-all.min.js"></script>
  <script>
    // ===== 全域變數 =====
    const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbwIyXv5zFKqi2E5aZQCA-XsjiAV80YVIl1IgGDCd25pCUdn8j7cPzxsWxqJl6Ixt9DS6w/exec";
    let calendar = null;
    let currentUser = null;      // { account, name, title, isAdmin }
    let selectedLeaveType = 'full';
    let selectedQuickLeaveType = 'full';
    let currentActiveFilter = 'day';
    let pickersInitialized = false;
    let mockDb = [];
    let userList = [];
    let editingLeaveId = null;
    let currentDayDetailDate = null;

    document.addEventListener("DOMContentLoaded", async function() {
      checkLoginState();
      bindDateAutoClose();
      if (currentUser) {
        applyAdminUI();
        await fetchUserList();
        fillUserPicker();
        fillDelegateSelects();
        await fetchAllLeaves();
      }
      try { initLazyPickers(); } catch (e) { console.error("選取器載入失敗", e); }
    });

    // ===== 小工具 =====
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function thisMonthStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    }
    function formatDateRangeDisplay(startDate, endDate) {
      if (!endDate || endDate === startDate) return startDate;
      return `${startDate} ~ ${endDate}`;
    }
    function rangeOverlapsDate(item, dateStr) {
      const end = item.endDate || item.startDate;
      return dateStr >= item.startDate && dateStr <= end;
    }

      formData.append('action', 'login'); formData.append('account', acc); formData.append('password', pass);

    function renderOverviewList(mode) {
      const container = document.getElementById('all-leaves-list'); if (!container) return;
      const tStr = todayStr(); const mStr = thisMonthStr();
      let filtered = []; let title = "";

      if (mode === 'day') { filtered = mockDb.filter(d => rangeOverlapsDate(d, tStr)); title = `<h6>今日 (${tStr}) 紀錄：</h6>`; }
      else if (mode === 'month') { filtered = mockDb.filter(d => (d.startDate <= mStr + '-31') && ((d.endDate || d.startDate) >= mStr + '-01')); title = `<h6>本月 (${mStr}) 紀錄：</h6>`; }
      else if (mode === 'custommonth') {
        const v = document.getElementById('overview-month-input').value;
        if (!v) { container.innerHTML = "<p class='text-muted text-center py-3 small'>請先選擇月份</p>"; return; }
        filtered = mockDb.filter(d => (d.startDate <= v + '-31') && ((d.endDate || d.startDate) >= v + '-01'));
        title = `<h6>${v} 紀錄：</h6>`;
      }
      else if (mode === 'seluser') {
        const u = getWheelValue('picker-ov-user');
        filtered = mockDb.filter(d => d.name === u); title = `<h6>同仁 (${u}) 查詢結果：</h6>`;
      }

      if (filtered.length === 0) { container.innerHTML = title + "<p class='text-muted text-center py-3 small'>無請假紀錄</p>"; }
      else {
        let html = title;
        filtered.sort((a,b) => a.startDate < b.startDate ? -1 : 1).forEach(x => {
          html += `<div class='p-2 mb-2 border-bottom small'><strong>${x.name}</strong> (${formatDateRangeDisplay(x.startDate, x.endDate)})<br><span class='text-secondary'>${x.start}~${x.end}${x.memo && x.memo !== '無' ? ' | ' + x.memo : ''}</span></div>`;
        });
        container.innerHTML = html;
      }
    }

      document.getElementById(`sect-${id}`).classList.add('active');

    // ===== 滾輪選取器 =====
    function initLazyPickers() {
      if (pickersInitialized) return;
      const fill = (id, max) => {
        const el = document.getElementById(id); if (!el) return;
        el.innerHTML = "<div style='height:36px;'></div>";
        for (let i = 0; i < max; i++) {
          let v = i < 10 ? '0'+i : ''+i;
          let item = document.createElement('div');
          item.className = 'ios-picker-item' + (i === 0 ? ' selected' : '');
          item.innerText = v;
          el.appendChild(item);
        }
        let pad = document.createElement('div'); pad.style.height = '36px'; el.appendChild(pad);
        el.addEventListener('scroll', () => {
          clearTimeout(el.t); el.t = setTimeout(() => {
            const idx = Math.round(el.scrollTop / 36) + 1;
            Array.from(el.children).forEach(c => c.classList.remove('selected'));
            if (el.children[idx]) el.children[idx].classList.add('selected');
          }, 60);
        });
      };
      fill('picker-sh', 24); fill('picker-sm', 60); fill('picker-eh', 24); fill('picker-em', 60);
      fill('q-picker-sh', 24); fill('q-picker-sm', 60); fill('q-picker-eh', 24); fill('q-picker-em', 60);
      fillUserPicker();
      pickersInitialized = true;
    }

    function fillUserPicker() {
      const uEl = document.getElementById('picker-ov-user');
      if (!uEl) return;
      uEl.innerHTML = "<div style='height:36px;'></div>";
      userList.forEach((u, i) => {
        let item = document.createElement('div');
        item.className = 'ios-picker-item' + (i === 0 ? ' selected' : '');
        item.innerText = u;
        uEl.appendChild(item);
      });
      let pad = document.createElement('div'); pad.style.height = '36px'; uEl.appendChild(pad);
      uEl.addEventListener('scroll', () => {
        clearTimeout(uEl.t); uEl.t = setTimeout(() => {
          const idx = Math.round(uEl.scrollTop / 36) + 1;
          Array.from(uEl.children).forEach(c => c.classList.remove('selected'));
          if (uEl.children[idx]) uEl.children[idx].classList.add('selected');
        }, 60);
      });
    }

    function getWheelValue(id) {
      const el = document.getElementById(id);
      const sel = el ? el.querySelector('.selected') : null;
      return sel ? sel.innerText : (el && el.children[1] ? el.children[1].innerText : "00");
    }

    function setWheelValueDisplay(id, value) {
      const el = document.getElementById(id); if (!el) return;
      const padded = String(parseInt(value, 10)).padStart(2, '0');
      const target = Array.from(el.children).find(c => c.innerText === padded);
      if (!target) return;
      Array.from(el.children).forEach(c => c.classList.remove('selected'));
      target.classList.add('selected');
      el.scrollTop = target.offsetTop - 36;
    }

    function showLoading(show) { document.getElementById('loading-spinner').style.display = show ? 'flex' : 'none'; }
    function openChangePasswordModal() { new bootstrap.Modal(document.getElementById('changePasswordModal')).show(); }
  </script>
</body>
</html>
